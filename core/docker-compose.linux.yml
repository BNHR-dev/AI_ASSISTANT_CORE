# docker-compose.linux.yml — variante Fedora/Linux du stack.
#
# Différences vs docker-compose.yml (Windows) :
#   - suffixe SELinux ":z" sur les volumes bind-montés (requis sous Fedora).
#   - GPU natif via nvidia-container-toolkit (pas de couche WSL2).
#
# Usage :  docker compose -f docker-compose.linux.yml up
#   Fichier AUTONOME (pas un override) — ne pas combiner avec docker-compose.yml,
#   sinon les volumes seraient déclarés en double.

services:

  ollama:
    image: ollama/ollama:0.5.7
    container_name: ollama
    runtime: nvidia
    gpus: all
    ports:
      - "127.0.0.1:${OLLAMA_PORT}:11434"
    volumes:
      - "${OLLAMA_DATA_PATH}:/root/.ollama:z"
    restart: unless-stopped
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES}
      - NVIDIA_DRIVER_CAPABILITIES=${NVIDIA_DRIVER_CAPABILITIES}
      # Baseline RTX 3060 12 Go : valeur conservative. 3-4 envisageable après bench.
      - OLLAMA_NUM_PARALLEL=2

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.9.5
    container_name: open-webui
    ports:
      - "127.0.0.1:${OPENWEBUI_PORT}:8080"
    depends_on:
      - ollama
      - searxng
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - SEARXNG_BASE_URL=${SEARXNG_BASE_URL}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
    volumes:
      - "${OPENWEBUI_DATA_PATH}:/app/backend/data:z"
    restart: unless-stopped

  searxng:
    image: searxng/searxng:2026.5.10-df1f24fb7
    container_name: searxng
    ports:
      - "127.0.0.1:${SEARXNG_PORT}:8080"
    volumes:
      - "${SEARXNG_CONFIG_PATH}:/etc/searxng:z"
    restart: unless-stopped
