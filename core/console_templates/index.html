{% extends "base.html" %}
{% block title %}AAC Console — Run{% endblock %}
{% block content %}
  <h1>Run <small>— type anything, the router decides</small></h1>

  <form hx-post="/console/run" hx-target="#resultat" hx-indicator="#spin" hx-disabled-elt="button">
    <textarea name="message" placeholder="Your request… (e.g. a Blender 3D scene: a teapot on a dark pedestal)"></textarea>
    <button type="submit">Run ▶</button>
  </form>
  <p id="spin" class="htmx-indicator">⏳ running…</p>

  <div id="resultat"></div>
{% endblock %}
