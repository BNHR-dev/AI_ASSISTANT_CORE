{% extends "base.html" %}
{% block title %}AAC Console — 2D Image{% endblock %}
{% block content %}
  <h1>🖼 2D — Image <small>— generate &amp; judge image outputs (ComfyUI)</small></h1>

  <div class="example-chips">
    <button type="button" data-p="a cinematic photo of a red fox in a misty forest at golden hour, highly detailed" onclick="aacFill(this.dataset.p)">🦊 Fox</button>
    <button type="button" data-p="a serene mountain lake at dawn, mist over still water, reflections, cinematic" onclick="aacFill(this.dataset.p)">🏔 Mountain lake</button>
    <button type="button" data-p="a cozy wooden cabin in a snowy forest at night, warm window light, cinematic" onclick="aacFill(this.dataset.p)">🏚 Snowy cabin</button>
  </div>

  <form hx-post="/console/run" hx-target="#resultat" hx-indicator="#spin" hx-disabled-elt="button">
    <textarea name="message" placeholder="Describe an image…"></textarea>
    <div class="form-actions">
      <button type="submit">Generate ▶</button>
      <label class="muted toggle">
        <input type="checkbox" name="final"> Final quality
        <small>(refiner + upscale, slower)</small>
      </label>
    </div>
  </form>
  <p id="spin" class="htmx-indicator">⏳ generating…</p>

  <div id="resultat"></div>
{% endblock %}
