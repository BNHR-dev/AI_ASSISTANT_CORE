<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}AAC Console{% endblock %}</title>
  <script src="/console/static/htmx.min.js" defer></script>
  <link rel="stylesheet" href="/console/static/console.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">◆ AAC <span>Console</span></div>
      <nav class="menu">
        <a href="#run"     data-tab="run" class="active">▶ <span>Run</span></a>
        <a href="#2d"      data-tab="2d">🖼 <span>2D — Image</span></a>
        <a href="#3d"      data-tab="3d">🧊 <span>3D — Blender</span></a>
        <a href="#outputs" data-tab="outputs" hx-get="/console/outputs" hx-target="#panel-outputs" hx-trigger="click">🗂 <span>Outputs</span></a>
        <a href="#eval"    data-tab="eval" hx-get="/console/eval" hx-target="#panel-eval" hx-trigger="click">📊 <span>Eval</span></a>
      </nav>
      <div class="sidebar-foot">
        <div id="health" hx-get="/console/health" hx-trigger="load" hx-swap="innerHTML">
          <p class="muted"><small>… checking the stack …</small></p>
        </div>
      </div>
    </aside>

    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script>
    // Single-page tabs: switch sections WITHOUT reloading, so in-flight work
    // (a running generation, a result) is never lost when changing menu.
    function aacTab(name) {
      document.querySelectorAll('.panel').forEach(function (p) {
        p.hidden = (p.dataset.panel !== name);
      });
      document.querySelectorAll('.menu a[data-tab]').forEach(function (a) {
        a.classList.toggle('active', a.dataset.tab === name);
      });
    }
    document.querySelectorAll('.menu a[data-tab]').forEach(function (a) {
      a.addEventListener('click', function (e) { e.preventDefault(); aacTab(a.dataset.tab); });
    });
    // Clickable examples fill the request box of the *visible* panel.
    function aacFill(p) {
      var t = document.querySelector('.panel:not([hidden]) textarea[name=message]');
      if (t) { t.value = p; t.focus(); }
    }
  </script>
</body>
</html>
