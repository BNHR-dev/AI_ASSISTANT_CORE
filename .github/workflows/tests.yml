name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Dev env runs 3.14; CI pins 3.13 for guaranteed wheel availability
          # on the pinned dependencies. The app code runs identically.
          python-version: "3.13"

      - name: Install dependencies
        # requirements-dev.txt inclut requirements.txt (-r) + pytest/ruff épinglés.
        run: pip install -r core/requirements-dev.txt

      - name: Lint (ruff — config dans ruff.toml)
        run: ruff check core/

      - name: Run tests (fully hermetic — no external services required)
        working-directory: core
        # `python -m pytest` (pas `pytest` nu) : ajoute core/ au sys.path -> `import app` OK.
        run: python -m pytest -q
