<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AAC Console</title>
  <script src="/console/static/htmx.min.js" defer></script>
  <link rel="stylesheet" href="/console/static/console.css">
</head>
<body>
  <h1>◆ AAC Console <small>— exécution locale & observabilité</small></h1>
  <nav><a href="/console">▶ Exécuter</a><a href="/console/eval">📊 Eval / Benchmark</a></nav>

  <div id="health" hx-get="/console/health" hx-trigger="load" hx-swap="innerHTML">
    <p><small>… vérification de la stack …</small></p>
  </div>

  <form hx-post="/console/run" hx-target="#resultat" hx-indicator="#spin" hx-disabled-elt="button">
    <textarea name="message" placeholder="Ta demande… (ex. : une scène 3d blender : une théière sur un socle sombre)"></textarea>
    <button type="submit">Lancer ▶</button>
  </form>
  <p id="spin" class="htmx-indicator">⏳ exécution en cours…</p>

  <div id="resultat"></div>
</body>
</html>
