<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AAC Console</title>
  <script src="/console/static/htmx.min.js" defer></script>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, sans-serif; max-width: 920px; margin: 2rem auto;
           padding: 0 1rem; line-height: 1.5; }
    h1 { font-size: 1.25rem; }
    form { display: flex; gap: .5rem; align-items: flex-start; }
    textarea { flex: 1; min-height: 3.5rem; padding: .6rem; font: inherit;
               border: 1px solid #8888; border-radius: 6px; }
    button { padding: .6rem 1rem; font: inherit; cursor: pointer;
             border: 1px solid #8888; border-radius: 6px; }
    .strip { display: flex; flex-wrap: wrap; gap: .5rem 1rem; align-items: center;
             padding: .6rem .8rem; border: 1px solid #8888; border-radius: 6px;
             margin: 1rem 0; }
    .badge { font-weight: 600; }
    .ok { color: #1a7f37; } .ko { color: #b3261e; }
    details { border: 1px solid #8888; border-radius: 6px; padding: .4rem .8rem;
              margin: .6rem 0; }
    summary { cursor: pointer; font-weight: 600; }
    pre { white-space: pre-wrap; word-break: break-word; background: #8881;
          padding: .6rem; border-radius: 6px; overflow-x: auto; }
    ul.steps { list-style: none; padding-left: 0; }
    ul.steps li { padding: .15rem 0; }
    img.render { max-width: 100%; border: 1px solid #8888; border-radius: 6px; }
    .gallery { display: flex; flex-wrap: wrap; gap: .6rem; }
    .gallery img { max-width: 240px; border: 1px solid #8888; border-radius: 6px; }
    .htmx-indicator { display: none; opacity: .7; }
    .htmx-request.htmx-indicator { display: inline; }
    .err { color: #b3261e; border-color: #b3261e; }
  </style>
</head>
<body>
  <h1>◆ AAC Console <small>— exécution locale & observabilité (V0)</small></h1>

  <form hx-post="/console/run" hx-target="#resultat" hx-indicator="#spin" hx-disabled-elt="button">
    <textarea name="message" placeholder="Ta demande… (ex. : une scène 3d blender : une théière sur un socle sombre)"></textarea>
    <button type="submit">Lancer ▶</button>
  </form>
  <p id="spin" class="htmx-indicator">⏳ exécution en cours…</p>

  <div id="resultat"></div>
</body>
</html>
